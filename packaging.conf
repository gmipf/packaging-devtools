# packaging.conf — per-repo config for scripts/build-tool.sh (see templates/packaging.conf.example)

COPR_OWNER=gmipf
# Default COPR project. Tools without a 4th field publish here.
COPR_PROJECT=devtools

# Tool registry — one line per tool:
#   TOOLS[<short>]="<copr-package>|<spec-path>|<trigger-branch>[|<copr-project>]"
# Spec path = <format>/<app>/<app>.spec ; 4th field overrides COPR_PROJECT per tool.
TOOLS[tea]="tea|fedora/tea/tea.spec|build-tea"
TOOLS[syft]="syft|fedora/syft/syft.spec|build-syft"
TOOLS[grype]="grype|fedora/grype/grype.spec|build-grype"
TOOLS[grant]="grant|fedora/grant/grant.spec|build-grant"
