issue_repository: https://github.com/gmipf/packaging-devtools

srpm_build_deps:
  - rpm-build
  - rpmdevtools

# Multi-package layout — one block per tool under packages:. With paths: set,
# specfile_path and action-internal paths are relative to that path. Sources are
# vendored flat in each tool's dir (create-archive just hands Packit the binary;
# a default `git archive HEAD` would only archive the spec).
packages:
  tea:
    paths:
      - fedora/tea/
    specfile_path: tea.spec
    upstream_project_url: https://gitea.com/gitea/tea
    # Repackage of the upstream prebuilt static binary, VENDORED: Source0 (.xz)
    # and the LICENSE (Source1) are committed flat in fedora/tea/, so create-
    # archive only points Packit at the already-present binary — NOTHING is
    # fetched. Keeps COPR's source build hermetic (enable_net=off, no network).
    # The upstream-release watcher (not the build) refreshes the vendored binary.
    actions:
      get-current-version:
        - bash -c "rpmspec -q --queryformat '%{version}\n' tea.spec | head -1"
      create-archive:
        - bash -c "ls -1 tea-*-linux-amd64.xz | head -1"

jobs:
  # Branch-scoped commit job: only a push to build-tea fires this build (a push
  # to main builds nothing). scripts/build-tool.sh manages the trigger branch +
  # the same-NEVRA auto-bump guard; do NOT hand-push build-tea. update_release
  # stays false so the published NEVRA is exactly the spec's (clean bare-N).
  - job: copr_build
    trigger: commit
    branch: build-tea
    packages: [tea]
    update_release: false
    owner: gmipf
    project: devtools
    targets:
      - fedora-all-x86_64
