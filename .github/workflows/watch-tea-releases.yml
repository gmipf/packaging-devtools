name: watch-tea-releases

# tea releases on gitea.com (NOT GitHub), tagged vX.Y.Z. We poll daily, read the
# latest release via gitea's API and, on a new tag: re-vendor the upstream static
# linux-amd64 binary (the .xz is committed, its filename carries the version),
# bump Version + reset Release in the spec, prepend a %changelog entry, commit to
# main and force-push the build-tea trigger branch so Packit fires exactly the tea
# COPR build. This automates, on every real upstream release, what a human would
# run as `scripts/build-tool.sh tea` by hand.
#
# Unlike the source-build watchers (redumper/dic), this one re-vendors a committed
# BINARY: git rm the old .xz, download + validate the new one, git add it. COPR's
# build stays offline (enable_net=off) — the network only happens HERE, where it's
# reliable. The man page needs NO action: it's regenerated from the new binary at
# build time (`tea man`), so it can never drift from the shipped version.
#
# Loud-fail (manual review) if the tag isn't vX.Y.Z or the download isn't a valid
# xz-compressed ELF — we must never commit a broken Source0.

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Sync tea spec + re-vendor binary on a new upstream release
        run: |
          set -euo pipefail
          DIR=fedora/tea
          SPEC=$DIR/tea.spec
          MARKER=$DIR/.upstream-tag
          API=https://gitea.com/api/v1/repos/gitea/tea

          UPSTREAM_TAG=$(curl -fsSL "$API/releases/latest" | jq -r '.tag_name')
          if [ -z "$UPSTREAM_TAG" ] || [ "$UPSTREAM_TAG" = "null" ]; then
            echo "::error::Could not read latest tea release tag from the gitea API"
            exit 1
          fi
          if ! printf '%s' "$UPSTREAM_TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Unexpected tea tag '$UPSTREAM_TAG' (want vX.Y.Z) — upstream may have changed naming; manual review"
            exit 1
          fi

          LOCAL_TAG=$(cat "$MARKER" 2>/dev/null || echo none)
          if [ "$UPSTREAM_TAG" = "$LOCAL_TAG" ]; then
            echo "Tag unchanged ($LOCAL_TAG) — no rebuild needed"
            exit 0
          fi
          echo "Upstream tag changed: $LOCAL_TAG -> $UPSTREAM_TAG"

          VERSION=${UPSTREAM_TAG#v}
          XZ=$DIR/tea-${VERSION}-linux-amd64.xz
          URL=https://gitea.com/gitea/tea/releases/download/${UPSTREAM_TAG}/tea-${VERSION}-linux-amd64.xz

          # Re-vendor: download to a temp, then fully decompress it as validation
          # (a bad/HTML body or truncated stream fails here) and confirm the payload
          # is a Linux ELF before we ever touch the tree. -f makes curl fail on HTTP
          # errors, so a 404 can't slip an error page through.
          TMP=$(mktemp); DEC=$(mktemp)
          curl -fsSL "$URL" -o "$TMP"
          if ! xz -dc "$TMP" > "$DEC" 2>/dev/null; then
            echo "::error::$URL is not a valid xz stream — refusing to vendor"
            exit 1
          fi
          MAGIC=$(od -An -tx1 -N4 "$DEC" | tr -d ' \n')
          if [ "$MAGIC" != "7f454c46" ]; then
            echo "::error::Decompressed payload is not an ELF (magic ${MAGIC:-empty}) — refusing to vendor"
            exit 1
          fi
          rm -f "$DEC"

          # The .xz filename carries the version, so the new file is a new path:
          # drop the old one, drop the new one in, stage both moves.
          git rm -q "$DIR"/tea-*-linux-amd64.xz
          mv "$TMP" "$XZ"
          git add "$XZ"

          # New upstream release = fresh identity: reset the packaging-iteration
          # counter and prepend a %changelog entry (LC_ALL=C for an English date;
          # EVR without %{?dist} to match the hand-written entries).
          echo "$UPSTREAM_TAG" > "$MARKER"
          sed -i "s|^Version:.*|Version:        ${VERSION}|" "$SPEC"
          sed -i "s/^Release:.*/Release:        1%{?dist}/" "$SPEC"
          CL_ENTRY=$(mktemp)
          {
            printf '* %s gmipf <gmipf64@gmail.com> - %s-1\n' \
              "$(LC_ALL=C date -u +'%a %b %d %Y')" "$VERSION"
            printf -- '- Automated sync to upstream tea release %s; re-vendored linux-amd64 binary, Release reset to 1.\n' "$UPSTREAM_TAG"
            printf '\n'
          } > "$CL_ENTRY"
          sed -i "/^%changelog/r $CL_ENTRY" "$SPEC"
          rm -f "$CL_ENTRY"

          git add "$SPEC" "$MARKER"
          if git diff --cached --quiet; then
            echo "Nothing staged after rewrite — exiting clean"
            exit 0
          fi

          git config user.name "rolling-watcher"
          git config user.email "actions@github.com"
          # The vendored .xz is ~7 MB; lift the post buffer so the push doesn't fall
          # back to a chunked body that must rewind on redirect ("cannot rewind RPC
          # post data"). Same workaround as scripts/build-tool.sh.
          git config http.postBuffer 524288000
          git commit -m "chore: tea ${UPSTREAM_TAG}"

          # main is canonical and builds NOTHING (the copr_build job is scoped to
          # branch build-tea). The trigger branch = main's tree + a cosmetic landing
          # README; force-pushing it fires ONLY the tea COPR job via Packit. Same
          # mechanism as scripts/build-tool.sh — never hand-push main:build-tea.
          git push origin HEAD:main
          git checkout -q -b trigger-tmp
          printf '# build-tea — tea (Fedora/COPR trigger branch)\n\nAuto-managed **trigger branch** for the `tea` package: a push here fires\nthe tea COPR build via Packit, nothing else rebuilds. Canonical source is\n`main` (do not edit here). Packaging: `fedora/tea/`.\n' > README.md
          git add README.md
          git commit -q -m "trigger: tea build (${VERSION}-1)"
          git push -f origin trigger-tmp:build-tea
